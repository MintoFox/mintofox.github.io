<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mintofox.net</title>
<link rel="icon" type="image/gif" href="minto_pfp.gif">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--mint:#4fc97e;--mint-dark:#2e7d52;--mint-panel:#2a6b4a;--mint-light:#a8f0c6;--bg:#0f2319;--card:#1f5238;--card-dark:#163826;--text:#e8fef2;--gold:#f5c842;--pink:#f78fb3;--purple:#b39ddb;--red:#f87171;--shadow:rgba(0,0,0,0.4);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(79,201,126,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 15%,rgba(79,201,126,.08) 0%,transparent 55%);}

/* NAV */
nav{display:flex;align-items:center;padding:0 2rem;height:70px;background:rgba(15,35,25,.95);backdrop-filter:blur(12px);border-bottom:2px solid rgba(79,201,126,.2);position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:.6rem;font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--mint-light);margin-right:auto;cursor:pointer;text-decoration:none;}
.nav-logo{width:40px;height:40px;border-radius:10px;overflow:hidden;border:2px solid rgba(79,201,126,.5);flex-shrink:0;}
.nav-logo img{width:100%;height:100%;object-fit:cover;}
.nav-links{display:flex;list-style:none;}
.nav-links a{display:block;padding:.5rem 1.2rem;color:var(--text);text-decoration:none;font-weight:700;font-size:1rem;border-radius:8px;transition:background .2s,color .2s;position:relative;cursor:pointer;}
.nav-links a.active{color:var(--mint-light);background:rgba(79,201,126,.12);}
.nav-links a.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--mint);border-radius:2px;}
.nav-links a:hover:not(.active){color:var(--mint-light);background:rgba(79,201,126,.07);}
.nav-right{display:flex;align-items:center;gap:.8rem;margin-left:1rem;}
.nav-user{font-size:.9rem;color:rgba(232,254,242,.6);cursor:pointer;font-weight:700;}
.nav-user:hover{color:var(--mint-light);}
.notif-btn{position:relative;width:36px;height:36px;border-radius:50%;background:rgba(79,201,126,.08);border:1.5px solid rgba(79,201,126,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:background .2s;}
.notif-btn:hover{background:rgba(79,201,126,.15);}
.notif-badge{position:absolute;top:-3px;right:-3px;background:#f87171;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;display:none;}
.notif-badge.show{display:flex;}

/* PAGES */
.page{display:none;}
.page.active{display:block;animation:fadeIn .3s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

main{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem 4rem;display:flex;flex-direction:column;gap:1.5rem;}

/* GENERIC CARD */
.card{background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.2);border-radius:18px;padding:1.6rem 1.8rem;box-shadow:0 4px 20px var(--shadow);}
.card-title{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--mint-light);margin-bottom:1rem;}

/* BUTTONS */
.btn{padding:.5rem 1.2rem;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;border:none;transition:filter .2s,transform .15s;display:inline-flex;align-items:center;gap:.4rem;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-mint{background:var(--mint);color:#0f2319;}
.btn-outline{background:transparent;color:var(--mint-light);border:1.5px solid rgba(79,201,126,.4);}
.btn-ghost{background:rgba(79,201,126,.08);color:var(--mint-light);border:1.5px solid rgba(79,201,126,.15);}
.btn-red{background:rgba(248,113,113,.12);color:var(--red);border:1.5px solid rgba(248,113,113,.25);}
.btn-red:hover{background:rgba(248,113,113,.2);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-full{width:100%;justify-content:center;padding:.75rem;font-size:1rem;border-radius:12px;margin-top:.4rem;}
.btn-sm{padding:.3rem .8rem;font-size:.8rem;border-radius:8px;}

/* FORMS */
.form-group{margin-bottom:.9rem;}
.form-group label{display:block;font-weight:800;font-size:.82rem;color:var(--mint-light);margin-bottom:.35rem;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.65rem 1rem;background:rgba(0,0,0,.3);border:1.5px solid rgba(79,201,126,.2);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(79,201,126,.5);}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(232,254,242,.25);}
.form-group select option{background:#1f5238;}
.form-group textarea{resize:vertical;min-height:90px;line-height:1.6;}
.msg-err{background:rgba(248,113,113,.12);border:1.5px solid rgba(248,113,113,.3);color:var(--red);border-radius:10px;padding:.65rem 1rem;font-size:.85rem;font-weight:700;margin-bottom:.8rem;display:none;}
.msg-ok{background:rgba(79,201,126,.12);border:1.5px solid rgba(79,201,126,.3);color:var(--mint-light);border-radius:10px;padding:.65rem 1rem;font-size:.85rem;font-weight:700;margin-bottom:.8rem;display:none;}

/* HOME */
.hero-card{background:linear-gradient(135deg,var(--mint-panel) 0%,#1e4d38 100%);border:1.5px solid rgba(79,201,126,.3);border-radius:20px;padding:2rem 2.5rem;display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:start;box-shadow:0 8px 32px var(--shadow);}
.avatar-img{width:200px;height:200px;border-radius:18px;object-fit:cover;border:3px solid rgba(79,201,126,.5);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.hero-info{display:flex;flex-direction:column;gap:.8rem;padding-top:.3rem;}
.hero-name{font-family:'Fredoka One',cursive;font-size:3.8rem;line-height:1;color:var(--text);}
.hero-bio{font-size:1.05rem;line-height:1.65;color:rgba(232,254,242,.88);font-weight:700;max-width:700px;}
.fluffy-badge{display:inline-block;background:rgba(79,201,126,.18);border:1.5px solid rgba(79,201,126,.4);color:var(--mint-light);font-weight:800;font-size:.9rem;padding:.3rem .9rem;border-radius:100px;width:fit-content;}
.lower-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.social-list{list-style:none;display:flex;flex-direction:column;gap:.55rem;}
.social-list li{display:flex;align-items:center;gap:.6rem;font-size:.95rem;font-weight:700;}
.social-platform{color:var(--mint);min-width:90px;font-weight:800;}
.community-card{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border:1.5px solid rgba(255,255,255,.08);border-radius:18px;padding:1.6rem 1.8rem;display:flex;flex-direction:column;gap:1rem;box-shadow:0 4px 20px var(--shadow);}
.community-card .card-title{color:#888;}
.fluxer-banner{background:#1a1a1a;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:1.3rem 1.6rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;text-decoration:none;transition:border-color .2s,background .2s;}
.fluxer-banner:hover{border-color:rgba(255,255,255,.25);background:#222;}
.fluxer-name{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#fff;}
.fluxer-logo{width:60px;height:60px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fluxer-logo img{width:38px;height:38px;}
.tags{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.8rem;}
.tag{padding:.3rem .9rem;border-radius:100px;font-size:.82rem;font-weight:800;border:1.5px solid;}
.tag-mint{background:rgba(79,201,126,.1);border-color:rgba(79,201,126,.35);color:var(--mint-light);}
.tag-pink{background:rgba(247,143,179,.1);border-color:rgba(247,143,179,.35);color:var(--pink);}
.tag-purple{background:rgba(179,157,219,.1);border-color:rgba(179,157,219,.35);color:var(--purple);}
.tag-gold{background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.35);color:var(--gold);}

/* FORUMS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.page-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--mint-light);}

/* SEARCH BAR */
.search-bar{background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.2);border-radius:16px;padding:1.2rem 1.4rem;box-shadow:0 4px 16px var(--shadow);}
.search-row{display:flex;gap:.7rem;align-items:center;margin-bottom:.8rem;}
.search-input-wrap{flex:1;position:relative;}
.search-input-wrap input{padding:.65rem 1rem .65rem 2.4rem;background:rgba(0,0,0,.3);border:1.5px solid rgba(79,201,126,.2);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;outline:none;width:100%;transition:border-color .2s;}
.search-input-wrap input:focus{border-color:rgba(79,201,126,.5);}
.search-input-wrap input::placeholder{color:rgba(232,254,242,.25);}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.9rem;opacity:.5;}
.filter-toggle{background:rgba(79,201,126,.08);border:1.5px solid rgba(79,201,126,.2);color:var(--mint-light);border-radius:10px;padding:.6rem 1rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:background .2s;white-space:nowrap;}
.filter-toggle:hover{background:rgba(79,201,126,.15);}
.filter-panel{display:none;border-top:1px solid rgba(79,201,126,.15);padding-top:.9rem;margin-top:.1rem;}
.filter-panel.open{display:block;animation:fadeIn .2s ease both;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;align-items:end;}
.filter-group label{display:block;font-weight:800;font-size:.78rem;color:rgba(232,254,242,.5);margin-bottom:.3rem;}
.filter-group input,.filter-group select{padding:.5rem .8rem;background:rgba(0,0,0,.3);border:1.5px solid rgba(79,201,126,.15);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;outline:none;width:100%;}
.filter-group input:focus,.filter-group select:focus{border-color:rgba(79,201,126,.4);}
.filter-actions{display:flex;gap:.5rem;margin-top:.8rem;justify-content:flex-end;}

/* FORUM CATEGORIES */
.forum-categories{display:flex;flex-direction:column;gap:1rem;}
.forum-category{background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.2);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px var(--shadow);}
.category-header{padding:.9rem 1.4rem;background:rgba(79,201,126,.08);border-bottom:1px solid rgba(79,201,126,.15);display:flex;align-items:center;gap:.6rem;}
.category-header h3{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--mint-light);}
.forum-thread{padding:.9rem 1.4rem;border-bottom:1px solid rgba(79,201,126,.07);display:flex;align-items:center;gap:.9rem;transition:background .15s;}
.forum-thread:last-child{border-bottom:none;}
.forum-thread:hover{background:rgba(79,201,126,.04);}
.thread-clickable{cursor:pointer;flex:1;display:flex;align-items:center;gap:.9rem;min-width:0;}
.thread-initial{width:36px;height:36px;border-radius:9px;background:rgba(79,201,126,.15);border:1.5px solid rgba(79,201,126,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--mint-light);flex-shrink:0;}
.thread-info{flex:1;min-width:0;}
.thread-title-text{font-weight:800;font-size:.92rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.thread-meta{font-size:.77rem;color:rgba(232,254,242,.4);margin-top:.12rem;}
.author-link{color:var(--mint);font-weight:700;cursor:pointer;}
.author-link:hover{text-decoration:underline;}
.thread-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.thread-stats{text-align:right;font-size:.77rem;color:rgba(232,254,242,.4);}
.thread-stats strong{display:block;font-size:.95rem;color:var(--text);}
.thread-actions{display:flex;gap:.3rem;opacity:0;transition:opacity .15s;}
.forum-thread:hover .thread-actions{opacity:1;}
.forum-empty{padding:2rem;text-align:center;color:rgba(232,254,242,.3);font-weight:700;font-size:.92rem;}

/* EXPANDED CATEGORY SCROLL WINDOW */
.cat-expanded{max-height:360px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(79,201,126,.3) transparent;}
.cat-expanded::-webkit-scrollbar{width:5px;}
.cat-expanded::-webkit-scrollbar-thumb{background:rgba(79,201,126,.3);border-radius:3px;}
.view-all-btn{display:block;width:100%;padding:.75rem;background:rgba(79,201,126,.05);border:none;border-top:1px solid rgba(79,201,126,.1);color:var(--mint-light);font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;text-align:center;transition:background .15s;}
.view-all-btn:hover{background:rgba(79,201,126,.1);}

/* THREAD VIEW */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--mint-light);font-weight:800;cursor:pointer;font-size:.88rem;background:rgba(79,201,126,.08);border:1.5px solid rgba(79,201,126,.2);padding:.4rem .9rem;border-radius:8px;transition:background .15s;margin-bottom:1.2rem;}
.back-btn:hover{background:rgba(79,201,126,.15);}
.thread-post-card{background:linear-gradient(135deg,var(--mint-panel) 0%,#1e4d38 100%);border:1.5px solid rgba(79,201,126,.3);border-radius:16px;padding:1.7rem 1.9rem;box-shadow:0 4px 20px var(--shadow);margin-bottom:1rem;}
.thread-post-title{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--text);margin-bottom:.5rem;}
.thread-post-meta{font-size:.8rem;color:rgba(232,254,242,.45);font-weight:700;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.cat-badge{background:rgba(79,201,126,.15);border:1px solid rgba(79,201,126,.3);color:var(--mint-light);border-radius:100px;padding:.12rem .6rem;font-size:.72rem;font-weight:800;}
.thread-post-body{font-size:1rem;line-height:1.75;color:rgba(232,254,242,.9);font-weight:700;white-space:pre-wrap;}
.thread-post-actions{display:flex;gap:.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(79,201,126,.15);}
.follow-btn{display:flex;align-items:center;gap:.4rem;}
.replies-section{display:flex;flex-direction:column;gap:.7rem;}
.reply-card{background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.12);border-radius:13px;padding:1.1rem 1.4rem;box-shadow:0 2px 10px var(--shadow);position:relative;}
.reply-meta{font-size:.78rem;color:rgba(232,254,242,.4);font-weight:700;margin-bottom:.45rem;display:flex;align-items:center;gap:.5rem;}
.reply-body{font-size:.93rem;line-height:1.65;color:rgba(232,254,242,.85);font-weight:700;white-space:pre-wrap;}
.reply-actions{position:absolute;top:.8rem;right:.9rem;display:flex;gap:.3rem;opacity:0;transition:opacity .15s;}
.reply-card:hover .reply-actions{opacity:1;}
.reply-compose{background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.2);border-radius:13px;padding:1.2rem 1.4rem;margin-top:.5rem;}
.reply-compose-title{font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--mint-light);margin-bottom:.7rem;}
.reply-login-note{text-align:center;font-size:.88rem;color:rgba(232,254,242,.35);font-weight:700;padding:.4rem;}
.reply-login-note a{color:var(--mint);cursor:pointer;}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--mint);margin-right:.3rem;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* USER POPOVER */
.user-popover{position:fixed;z-index:600;background:linear-gradient(135deg,var(--card) 0%,var(--card-dark) 100%);border:1.5px solid rgba(79,201,126,.3);border-radius:14px;padding:1rem 1.2rem;box-shadow:0 8px 24px rgba(0,0,0,.55);min-width:190px;pointer-events:none;opacity:0;transition:opacity .15s;}
.user-popover.visible{opacity:1;pointer-events:auto;}
.pop-name{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--text);margin-bottom:.15rem;}
